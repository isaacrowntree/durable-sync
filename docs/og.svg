<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#121a2e"/>
      <stop offset="1" stop-color="#0b1020"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#16203a"/>
      <stop offset="1" stop-color="#0d1428"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- ledger rules, fading down -->
  <g stroke="#1a2440" stroke-width="1" opacity="0.55">
    <line x1="0" y1="96"  x2="1200" y2="96"/>
    <line x1="0" y1="128" x2="1200" y2="128"/>
    <line x1="0" y1="160" x2="1200" y2="160"/>
    <line x1="0" y1="192" x2="1200" y2="192"/>
  </g>

  <!-- wordmark -->
  <text x="72" y="86" font-family="Menlo, monospace" font-size="21" font-weight="600" fill="#f0f5ff">
    durable<tspan fill="#4fd1c5">-</tspan>sync
  </text>

  <!-- headline -->
  <text font-family="Helvetica Neue, Helvetica, sans-serif" font-weight="bold" fill="#f0f5ff" letter-spacing="-1.2">
    <tspan x="72" y="228" font-size="57">OFFLINE-FIRST SYNC FOR</tspan>
    <tspan x="72" y="296" font-size="57">CLOUDFLARE DURABLE OBJECTS</tspan>
  </text>

  <text x="72" y="346" font-family="Helvetica Neue, Helvetica, sans-serif" font-size="23" fill="#7285a9">
    An append-only op log on the server, a durable outbox on the client.
  </text>

  <!-- the journal -->
  <rect x="72" y="386" width="712" height="172" rx="10" fill="url(#panel)" stroke="#22304f"/>

  <g font-family="Menlo, monospace" font-size="17">
    <text x="96" y="420">
      <tspan fill="#4fd1c5">003</tspan><tspan x="156" fill="#7285a9">set.logged</tspan><tspan x="300" fill="#ccd6ee">squat 5×5 @ 102.5kg</tspan><tspan x="672" fill="#4fd1c5" font-size="14">ACKED</tspan>
    </text>
    <text x="96" y="450">
      <tspan fill="#4fd1c5">004</tspan><tspan x="156" fill="#7285a9">note.added</tspan><tspan x="300" fill="#ccd6ee">felt heavy on the last rep</tspan><tspan x="672" fill="#4fd1c5" font-size="14">ACKED</tspan>
    </text>
  </g>

  <line x1="72" y1="472" x2="784" y2="472" stroke="#22304f" stroke-dasharray="4 4"/>
  <text x="96" y="494" font-family="Menlo, monospace" font-size="12" fill="#4a5a7a" letter-spacing="2">OUTBOX</text>
  <text x="196" y="494" font-family="Menlo, monospace" font-size="12" fill="#e8a33d" letter-spacing="1">1 QUEUED</text>

  <g font-family="Menlo, monospace" font-size="17">
    <text x="96" y="532">
      <tspan fill="#4a5a7a">·</tspan><tspan x="156" fill="#7285a9">set.logged</tspan><tspan x="300" fill="#e8a33d">bench 5×5 @ 60kg</tspan><tspan x="660" fill="#e8a33d" font-size="14">PENDING</tspan>
    </text>
  </g>

  <!-- right rail -->
  <g font-family="Menlo, monospace" font-size="16">
    <text x="828" y="420" fill="#4fd1c5">npm i durable-sync</text>
    <text x="828" y="456" fill="#4a5a7a">zero dependencies</text>
    <text x="828" y="482" fill="#4a5a7a">no Postgres</text>
    <text x="828" y="508" fill="#4a5a7a">no container</text>
    <text x="828" y="534" fill="#4a5a7a">MIT</text>
  </g>
</svg>
